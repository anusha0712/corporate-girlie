<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Corporate Girlie — Evals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="evals.css">
</head>
<body data-state="empty" data-mode="generate">

  <div class="bg-sparkles" aria-hidden="true">
    <svg class="memphis-sticker s1" width="68" height="68" viewBox="0 0 68 68">
      <polygon class="f-accent2 s-text" points="34,4 64,60 4,60" stroke-width="3.5"/>
    </svg>
    <svg class="memphis-sticker s2" width="80" height="38" viewBox="0 0 80 38">
      <path class="f-none s-accent1" d="M4 20 Q15 4 26 20 T48 20 T74 20" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <svg class="memphis-sticker s3" width="58" height="58" viewBox="0 0 58 58">
      <circle class="f-none s-text" cx="29" cy="29" r="24" stroke-width="4"/>
      <circle class="f-accent3" cx="29" cy="29" r="10"/>
    </svg>
    <svg class="memphis-sticker s4" width="64" height="40" viewBox="0 0 64 40">
      <path class="f-none s-accent4" d="M4 36 L20 4 L36 36 L52 4 L60 36" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="memphis-sticker s5" width="60" height="60" viewBox="0 0 60 60">
      <rect class="f-text" x="4" y="4" width="52" height="52"/>
      <rect class="f-bg" x="4" y="4" width="26" height="26"/>
      <rect class="f-bg" x="30" y="30" width="26" height="26"/>
    </svg>
    <svg class="memphis-sticker s6" width="60" height="36" viewBox="0 0 60 36">
      <path class="f-accent1 s-text" d="M0 36 A30 30 0 0 1 60 36 Z" stroke-width="3"/>
    </svg>
    <svg class="memphis-sticker s7" width="46" height="46" viewBox="0 0 46 46">
      <polygon class="f-accent2 s-text" points="23,2 28,17 44,17 31,27 36,42 23,33 10,42 15,27 2,17 18,17" stroke-width="2.5"/>
    </svg>
    <svg class="memphis-sticker s8" width="34" height="34" viewBox="0 0 34 34">
      <circle class="f-accent3 s-text" cx="17" cy="17" r="14" stroke-width="3"/>
    </svg>
  </div>

  <div class="eval-shell">

    <!-- Top bar: back link + session stats + send button -->
    <div class="eval-top">
      <a href="index.html" class="eval-back-link">← back</a>
      <div class="eval-stats" id="eval-stats">0 rated</div>
      <div class="eval-top-right">
        <button type="button" class="send-btn" id="send-btn" hidden>Send to Claude</button>
      </div>
    </div>

    <!-- Middle: one of start / loading / error / phrase card -->
    <div class="eval-card-area" id="eval-card-area">

      <div class="eval-start" id="eval-start">
        <p class="eval-start-title">Rate a phrase ✦</p>
        <button type="button" class="start-btn" id="start-btn">Start Session ✦</button>
        <button type="button" class="resume-btn" id="resume-btn" hidden>Resume session</button>
      </div>

      <div class="eval-loading" id="eval-loading" hidden>
        <span class="spin-star" aria-hidden="true">✦</span> generating...
      </div>

      <div class="eval-error" id="eval-error" hidden>
        <p class="eval-error-msg">Something went wrong loading a phrase.</p>
        <button type="button" class="retry-btn" id="retry-btn">Try again</button>
      </div>

      <div class="eval-phrase-card" id="eval-phrase-card" hidden>
        <p class="eval-phrase-text" id="eval-phrase-text"></p>
        <p class="eval-usage-text" id="eval-usage-text"></p>
        <textarea class="eval-note" id="eval-note" placeholder="notes on this one..." rows="2"></textarea>
      </div>

    </div>

    <!-- Bottom: rating buttons, always pinned -->
    <div class="eval-rating-row" id="eval-rating-row" hidden>
      <button type="button" class="rate-btn rate-bad"  data-rating="bad"  id="rate-bad"  disabled>Bad</button>
      <button type="button" class="rate-btn rate-eh"   data-rating="eh"   id="rate-eh"   disabled>Eh</button>
      <button type="button" class="rate-btn rate-good" data-rating="good" id="rate-good" disabled>Good</button>
    </div>

  </div>

  <script type="module" src="evals.js"></script>
</body>
</html>
